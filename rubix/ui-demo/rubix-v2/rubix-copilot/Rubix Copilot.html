<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rubix — Copilot Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@0.453.0/dist/umd/lucide.min.js"></script>
<style>
  :root{
    --bg:234 18% 6%;--panel:232 15% 9%;--panel2:230 14% 12%;--panel3:230 13% 15%;
    --border:230 10% 18%;--fg:220 16% 93%;--muted:220 8% 56%;
    --r1:258 84% 74%;--r2:174 70% 56%;
    --amber:32 92% 60%;--crit:357 84% 66%;--green:150 64% 52%;--cool:200 86% 64%;
  }
  *{font-family:"Geist",ui-sans-serif,system-ui,sans-serif}
  .serif{font-family:"Newsreader",Georgia,serif}
  .mono{font-family:"Geist Mono",ui-monospace,monospace;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
  ::-webkit-scrollbar{width:0;height:0}
  body{background:radial-gradient(1200px 700px at 82% -10%,hsl(258 84% 74%/.08),transparent),radial-gradient(1000px 800px at -8% 120%,hsl(174 70% 56%/.06),transparent),hsl(var(--bg));}
  @keyframes orb{0%,100%{transform:rotate(0deg) scale(1)}50%{transform:rotate(180deg) scale(1.08)}}
  .orb-core{background:conic-gradient(from 0deg,hsl(var(--r1)),hsl(var(--r2)),hsl(var(--amber)),hsl(var(--r1)));animation:orb 9s ease-in-out infinite}
  @keyframes blink{50%{opacity:.4}} .blink{animation:blink 1.8s infinite}
  @keyframes draw{to{stroke-dashoffset:0}}
  .qitem{transition:.16s cubic-bezier(.4,0,.2,1)} .qitem:hover{transform:translateY(-2px)}
  .chip{transition:.14s} .chip:hover{background:hsl(var(--panel3));border-color:hsl(var(--r1)/.4)}
  .pal{transition:opacity .15s, transform .15s} .pal.hidden{opacity:0;transform:scale(.98);pointer-events:none}
  .fade{animation:fade .3s ease} @keyframes fade{from{transform:translateY(7px);opacity:.4}to{transform:none;opacity:1}}
  @keyframes think{0%,80%,100%{opacity:.25;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
  .dot1{animation:think 1.1s infinite}.dot2{animation:think 1.1s infinite .15s}.dot3{animation:think 1.1s infinite .3s}
  kbd{font-family:"Geist Mono",monospace;font-size:10px;background:hsl(var(--panel3));border:1px solid hsl(var(--border));border-radius:5px;padding:1px 5px}
  .selrow{background:hsl(var(--panel3))!important;box-shadow:inset 2px 0 0 hsl(var(--r1))}
</style>
<script>
  tailwind.config={theme:{extend:{colors:{
    bg:'hsl(var(--bg))',panel:'hsl(var(--panel))',panel2:'hsl(var(--panel2))',panel3:'hsl(var(--panel3))',
    border:'hsl(var(--border))',fg:'hsl(var(--fg))',muted:'hsl(var(--muted))',
    r1:'hsl(var(--r1))',r2:'hsl(var(--r2))',amber:'hsl(var(--amber))',crit:'hsl(var(--crit))',green:'hsl(var(--green))',cool:'hsl(var(--cool))'
  },fontFamily:{sans:['Geist','sans-serif'],serif:['Newsreader','serif'],mono:['Geist Mono','monospace']}}}};
</script>
</head>
<body class="text-fg antialiased" style="width:1440px;height:900px;overflow:hidden">

<div id="app" class="h-full"></div>

<!-- ===== OMNI SEARCH (search-driven nav) ===== -->
<div id="pal" class="pal hidden fixed inset-0 z-50 grid place-items-start justify-center pt-[11vh]" style="background:hsl(234 18% 4%/.62)">
  <div class="w-[580px] rounded-2xl border border-border bg-panel2 shadow-2xl overflow-hidden">
    <div class="flex items-center gap-3 px-4 border-b border-border py-3.5">
      <i data-lucide="search" class="size-4 text-muted"></i>
      <input id="palInput" autocomplete="off" class="flex-1 bg-transparent outline-none text-[15px] placeholder:text-muted" placeholder="Search sites, pages, dashboards, zones — or ask Rubix…" />
      <kbd>esc</kbd>
    </div>
    <div id="palResults" class="p-2 max-h-[440px] overflow-auto"></div>
    <div class="px-4 py-2.5 border-t border-border text-[11.5px] text-muted flex items-center gap-1.5"><i data-lucide="info" class="size-3.5"></i>Search jumps anywhere — sites, the building menu, dashboards, zones, or straight to Rubix.</div>
  </div>
</div>

<!-- toast -->
<div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[60] opacity-0 transition-all duration-300 translate-y-2 pointer-events-none">
  <div class="flex items-center gap-2.5 rounded-xl border border-green/30 bg-panel3 px-4 py-2.5 text-[13px] shadow-2xl"><i data-lucide="check-circle-2" class="size-4 text-green"></i><span id="toastmsg">Done</span></div>
</div>

<script src="copilot/data.js"></script>
<script src="copilot/viz.js"></script>
<script src="copilot/answers.js"></script>
<script src="copilot/model.js"></script>
<script src="copilot/screens.js"></script>
<script src="copilot/app.js"></script>
</body>
</html>
